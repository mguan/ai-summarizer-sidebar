<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>AI Summarizer Sidebar</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .tabs {
            display: flex;
            background-color: #e8eaed;
            flex-shrink: 0;
            padding: 8px 4px 0;
            gap: 0;
            z-index: 10;
        }

        .tab {
            flex: 1;
            padding: 9px 4px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            font-size: 13px;
            font-weight: 500;
            color: #5f6368;
            background-color: transparent;
            border-radius: 8px 8px 0 0;
            transition: background-color 0.15s ease, color 0.15s ease;
            position: relative;
            overflow: visible;
            white-space: nowrap;
            min-width: 0;
        }

        .tab:hover:not(.active) {
            background-color: rgba(255, 255, 255, 0.6);
            color: #202124;
        }

        .tab.active {
            background-color: #ffffff;
            color: #202124;
            font-weight: 600;
            z-index: 2;
        }

        /* Concave curved bottom-left corner on active tab */
        .tab.active::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: -8px;
            width: 8px;
            height: 8px;
            background: #e8eaed;
            border-top-right-radius: 8px;
            pointer-events: none;
        }

        /* Concave curved bottom-right corner on active tab */
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: -8px;
            width: 8px;
            height: 8px;
            background: #e8eaed;
            border-top-left-radius: 8px;
            pointer-events: none;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background-color: #ffffff;
        }

        iframe.hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="tabs" id="tabs-container">
        <div class="tab" data-provider="chatgpt">ChatGPT</div>
        <div class="tab" data-provider="claude">Claude</div>
        <div class="tab" data-provider="gemini">Gemini</div>
        <div class="tab" data-provider="grok">Grok</div>
    </div>
    <iframe id="frame-chatgpt" class="hidden" src=""></iframe>
    <iframe id="frame-claude" class="hidden" src=""></iframe>
    <iframe id="frame-gemini" class="hidden" src=""></iframe>
    <iframe id="frame-grok" class="hidden" src=""></iframe>
    <script type="module" src="sidepanel.js"></script>
</body>

</html>
